<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Itim&family=Orbitron:wght@400..900&family=Rammetto+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css_users/bootstrap.min.css">
    <link rel="stylesheet" href="../../css_admin/global.css">
    <link rel="stylesheet" href="../../css_admin/stock.css">
    <link rel="stylesheet" href="../../css_admin/tablesort.css">
    <title>Vendinha Solidária</title>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg px-3 px-md-4 navbar-options navbar-dark"> 
            
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img class="img-vale" src="../../assets/imgs/logo-vale-white.png" alt="Logo">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav" aria-controls="menuNavegacao" aria-expanded="false" aria-label="Alternar navegação">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menuNav">
                    <div class="navbar-nav ms-auto gap-2 gap-md-4 ">
                        <a class="nav-link option" href="#">Produtos</a>
                        <a class="nav-link option" href="./entries.html">Entradas</a>
                        <a class="nav-link option" href="./outflows.html">Saídas</a>
                        <a class="nav-link option" href="./stock.html">Estoque</a>
                        <a class="nav-link option" href="./nfs.html">N.Fs</a>
                        <a class="nav-link option" href="./login.html">Sair</a>
                    </div>
                </div>

            </div>
        </nav>
    </header>

    <main class="d-flex align-items-center justify-content-start flex-column">
        <h1 class="fw-bold h5 my-5">Estoque</h1>

        <div class="position-absolute end-0 my-3 mx-5">
            <button id="btn-place" class="btn-place">
                <img id="arrow-img" src="../../assets/icons/chevron-down.svg" alt="">
                <span id="btn-text-place">Doutor</span>
            </button>
            <div id="dropdown-menu" class="dropdown-menu text-center">
            </div>
        </div>

        <div class="table-container table-responsive overflow-auto mb-5">
            
            <table id="table" class="table table-hover text-center">
                <thead class="table-light sticky-top">
                    <tr>
                        <th scope="col">Produto</th>
                        <th scope="col">Quantidade</th>
                    </tr>
                </thead>

            </table>
        </div>

        <div class="modal fade" id="modalImg" tabindex="-1" aria-labelledby="modalImgLabel">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div id="modal-body" class="modal-body text-center">

                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button id="btn-confirm" type="button" class="btn btn-success" data-bs-dismiss="modal">Confirmar</button>
                </div>

                </div>
            </div>
        </div>
        
    </main>

    <script src="../../js/config.js"></script>
    <script src="../../js/libs/bootstrap.bundle.min.js"> </script>
    <script src="../../js/libs/tablesort.min.js"></script>
    <script src="../../js/libs/tablesort.number.js"></script>
    <script type="module" src="../../js/pages/StockPage.js"></script>
    <script src="../../js/libs/axios.min.js" ></script>

</html>
