<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Itim&family=Orbitron:wght@400..900&family=Rammetto+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Vendinha Solidária</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="header w-100 d-flex flex-column">
        <h1 class="title text-center fw-bold m-0">Vendinha Solidária</h1>
        <p class="subtitle fw-bold text-center">DBPG - Complexo Mariana</p>
    </header>

    <main id="main" class="main rounded-top-5 flex-grow-1 d-flex flex-column align-items-center justify-content-center position-relative">
        <a class="btn-back p-2 fw-bold align-self-start" href="../index.html">
            <img class="p-1" src="../assets/icons/arrow-green.svg">Voltar
        </a>

        <h2 id="desc" class="h6 fw-bold w-75 text-center lh-sm mt-4">Pra gente organizar tudo certinho, informe seu nome completo</h2>

        <div class="gap-4 d-flex flex-column align-items-center justify-content-center mt-5">
            <input id="name" class="input" type="text" placeholder="Nome">
            <input id="last-name" class="input" type="text" placeholder="Sobrenome">
        </div>

        <a href="#" id="register-btn" class="btn-arrow m-5 mt-auto"> <img id= "arrow-ico" src="../assets/icons/arrow-white.svg" alt=""></a>
        <script type="module" src="../js/pages/registerPage.js"></script>
    </main>
</body>
</html>
