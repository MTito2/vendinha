<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/payment.css">
    <link rel="stylesheet" href="../css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Itim&family=Orbitron:wght@400..900&family=Rammetto+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <title>Vendinha Solidária</title>

<body class="d-flex flex-column min-vh-100">
    <header class="header w-100 d-flex flex-column">
        <h1 class="title text-center fw-bold m-0">Vendinha Solidária</h1>
        <p class="subtitle fw-bold text-center">DBPG - Complexo Mariana</p>
    </header>

    <main class="main rounded-top-5 flex-grow-1 d-flex flex-column align-items-center justify-content-center">
        <a class="btn-back p-2 fw-bold align-self-start" href="./products.html">
            <img class="p-1" src="../assets/icons/arrow-green.svg">Voltar
        </a>

        <h2 id="desc" class="h6 fw-bold text-center lh-sm mt-4 mb-3">Realize o pagamento</h2>
        <img src="../assets/imgs/qrcode-ex.png" alt="">
        <div class="container p-4">
            <h3 id="title-about" class="h6">Sobre o QR Code</h3>
            <div>
                <div class="d-flex justify-content-between">
                    <p class="p">Nome</p>
                    <p class="p">Luciana Lustosa Jardim</p>
                </div>
                
                <div class="d-flex justify-content-between">
                    <p class="p">Chave Pix</p>
                    <p class="p">vendinhasolidariamariana@gmail.com</p>
                </div>
            </div>
        </div>

        <p class="division mb-4"></p>

        <div id="container-products" class="container px-4 vh-100 overflow-auto">

        </div>
        
        <div class="container d-flex justify-content-between w-100 mt-4 px-4">
            <h3 id="title-total" class="h5">Total</h3>
            <h3 id="title-total-price" class="h5">R$ </h3>
        </div>

        <a href="#" id="btn-checkout" class="btn-next m-5 mt-auto">Confirmar Pagamento</a>
        <script type="module" src="../js/pages/paymentPage.js"></script>
        <script src="../js/libs/axios.min.js"></script>

    </main>
</body>
</html>
